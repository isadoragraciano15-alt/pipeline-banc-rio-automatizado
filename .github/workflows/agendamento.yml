name: Pedagio Automático

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

jobs:
  rodar-pedagio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Instalar Dependências
        run: pip install pandas supabase python-dotenv

      - name: Executar Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python script_validacao.py

      # --- O PASSO QUE ESTAVA FALTANDO AQUI ---
      - name: Salvar alterações (Arquivar processados)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/processados/ *.csv
          # O comando abaixo evita que o workflow quebre se não houver nada novo para salvar
          git commit -m "Arquivando arquivos processados [skip ci]" || echo "Sem mudanças para salvar"
          git push